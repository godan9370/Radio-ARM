  .meta { font-size: 9px; text-transform: uppercase; letter-spacing: 0.3em; text-align: right; line-height: 1.6; }

  .me .who { color: #000; opacity: 1; }
  .text { white-space: pre-wrap; }
  .me { text-align: right; }
  .system { text-align: center; font-size: 9px; text-transform: uppercase; letter-spacing: 0.3em; opacity: 0.5; margin: 24px 0; }
  form { display: flex; border-top: 1px solid #111; background: #d9d9d4; }
  input {
    flex: 1; border: 0; background: transparent; padding: 18px 24px;
    font-family: inherit; font-size: 13px; color: #111; outline: none; letter-spacing: 0.02em;
  }
  input::placeholder { text-transform: uppercase; letter-spacing: 0.3em; font-size: 10px; color: #555; }
  button {
    border: 0; border-left: 1px solid #111; background: #111; color: #d9d9d4;
    padding: 0 24px; font-family: inherit; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.3em; cursor: pointer;
  }
  button:hover { background: #000; }
  .typing { font-size: 10px; text-transform: uppercase; letter-spacing: 0.25em; opacity: 0.6; padding: 4px 0; height: 18px; }
  .sticker { margin-top: 4px; }
  .sticker svg { display: block; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: #111; }
</style>

function pick(arr){ return arr[Math.floor(Math.random() * arr.length)]; }

function render(npcKey, text, isMe, opts){
  opts = opts || {};
  var div = document.createElement("div");
  div.className = "msg" + (isMe ? " me" : "");
  var who = document.createElement("div");
  who.className = "who";
  who.textContent = isMe ? "Dan Go" : NPCS[npcKey].name;
  div.appendChild(who);
  if (opts.sticker){
    var s = document.createElement("div");
    s.className = "sticker";
    s.innerHTML = NADIA_STICKER_SVG;
    div.appendChild(s);
  } else {
    var t = document.createElement("div");
    t.className = "text";
    t.textContent = text;
    div.appendChild(t);
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function pickResponders(userText){
  var t = userText.toLowerCase();
  var responders = [];
  var seen = {};

  Object.keys(NPCS).forEach(function(key){
    var first = NPCS[key].name.split(" ")[0].toLowerCase();
    if (t.indexOf(first) !== -1 || t.indexOf("@" + key) !== -1){
      responders.push({ npc: key, line: pick(NPCS[key].pool) });
      seen[key + "|direct"] = true;
    }
  });

  for (var i = 0; i < TRIGGERS.length; i++){
    var trig = TRIGGERS[i];
    if (!NPCS[trig.npc] || !trig.line) continue;
    var hit = false;
    for (var j = 0; j < trig.keys.length; j++){
      if (t.indexOf(trig.keys[j]) !== -1){ hit = true; break; }
    }
    if (hit){
      var sig = trig.npc + "|" + trig.line;
      if (!seen[sig]){
        responders.push({ npc: trig.npc, line: trig.line });
        seen[sig] = true;
      }
    }
  }

  var trimmed = userText.trim();
  var isQuestion = /\?$/.test(trimmed) || /^(what|who|where|when|why|how|is|are|do|does|did|can|should|could)\b/i.test(trimmed);
  if (isQuestion && Math.random() < 0.7){
    responders.push({ npc: "nadia", line: pick(["-.-","yes","omg","thanks all"]) });
  }

  if (responders.length === 0){
    var allKeys = Object.keys(NPCS);
    var extras = 2 + Math.floor(Math.random() * 2);
    for (var k = 0; k < extras; k++){
      var npc = pick(allKeys);
      responders.push({ npc: npc, line: pick(NPCS[npc].pool) });
    }
  } else if (Math.random() < 0.5){
    var allKeys2 = Object.keys(NPCS);
    var npc2 = pick(allKeys2);
    responders.push({ npc: npc2, line: pick(NPCS[npc2].pool) });
  }

  return responders.slice(0, 5);
}

function typeAndSend(npcKey, text, delay){
  return new Promise(function(resolve){
    setTimeout(function(){
      typing.textContent = NPCS[npcKey].name + " is typing ...";
      if (npcKey === "nadia" && Math.random() < 0.125){
        setTimeout(function(){
          typing.textContent = "";
          render(npcKey, "", false, { sticker: true });
          resolve();
        }, 700);
        return;
      }
      setTimeout(function(){
        typing.textContent = "";
        render(npcKey, text, false);
        resolve();
      }, 500 + text.length * 20);
    }, delay);
  });
}

form.addEventListener("submit", function(e){
  e.preventDefault();
  var text = input.value.trim();
  if (!text) return;
  render(null, text, true);
  input.value = "";

  var responders = pickResponders(text);
  var delay = 400;
  var lastNpc = null;
  var chain = Promise.resolve();
  responders.forEach(function(r){
    chain = chain.then(function(){
      return typeAndSend(r.npc, r.line, delay);
    }).then(function(){
      delay = 200 + Math.floor(Math.random() * 600);
      lastNpc = r.npc;
    });
  });
  chain.then(function(){
    if (lastNpc && CHAIN_REACTIONS[lastNpc] && Math.random() < 0.45){
      var riff = pick(CHAIN_REACTIONS[lastNpc]);
      return typeAndSend(riff.npc, riff.line, 800);
    }
  });
});
