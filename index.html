    padding: 18px 24px;

    font-size: 13px;
    color: #111;
    outline: none;
    letter-spacing: 0.02em;
  }

    text-transform: uppercase;
    letter-spacing: 0.3em;
    font-size: 10px;
    color: #555;
  }

    border-left: 1px solid #111;
    background: #111;
    color: #d9d9d4;
    padding: 0 24px;
    font-family: inherit;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    cursor: pointer;
  }

  .typing {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    opacity: 0.6;
    padding: 4px 0;
    height: 18px;
  }

    font-size: 56px;
    line-height: 1;
    margin-top: 4px;
  }
  ::-webkit-scrollbar { width: 6px; }
