function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function render(npcKey, text, isMe) {
  const div = document.createElement('div');
  div.className = 'msg' + (isMe ? ' me' : '');
  const who = document.createElement('div');
  who.className = 'who';
  who.textContent = isMe ? "Dan Go" : NPCS[npcKey].name;
  const t = document.createElement('div');
  t.className = 'text';
  t.textContent = text;
  div.appendChild(who);
  div.appendChild(t);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function pickResponders(userText) {
  const t = userText.toLowerCase();
  const responders = [];
  const seen = new Set();

  // 1. direct address — if a name is in the message, that NPC responds first
  for (const key of Object.keys(NPCS)) {
    const first = NPCS[key].name.split(" ")[0].toLowerCase();
    if (t.includes(first) || t.includes("@" + key)) {
      const line = pick(NPCS[key].pool);
      responders.push({ npc: key, line });
      seen.add(key);
    }
  }

  // 2. collect keyword-triggered NPCs
  for (const trig of TRIGGERS) {
    if (trig.keys.some(k => t.includes(k))) {
      const sig = trig.npc + "|" + trig.line;
      if (!seen.has(sig)) {
        responders.push({ npc: trig.npc, line: trig.line });
        seen.add(sig);
      }
    }
  }

  // 3. questions get extra chatter
  const isQuestion = /\?$/.test(userText.trim()) || /^(what|who|where|when|why|how|is|are|do|does|did|can|should|could)\b/i.test(userText.trim());
  if (isQuestion && Math.random() < 0.7) {
    responders.push({ npc: "nadia", line: pick(["-.-", "yes", "omg", "thanks all"]) });
  }

  // 4. if nothing matched, fire 2-3 random reactions so chat never goes silent
  if (responders.length === 0) {
    const allKeys = Object.keys(NPCS);
    const extras = 2 + Math.floor(Math.random() * 2);
    for (let i = 0; i < extras; i++) {
      const npc = pick(allKeys);
      responders.push({ npc, line: pick(NPCS[npc].pool) });
    }
  } else {
    // otherwise add a small chance of a random extra riff
    if (Math.random() < 0.5) {
      const allKeys = Object.keys(NPCS);
      const npc = pick(allKeys);
      responders.push({ npc, line: pick(NPCS[npc].pool) });
    }
  }

  // cap at 5 to keep it readable
  return responders.slice(0, 5);
}

// occasionally a second NPC quotes/riffs off the last NPC reply
const CHAIN_REACTIONS = {
  nessie: [{ npc: "axeris", line: "Nessie I'm confiscating your keyboard, no more typing for you" }],
  tom: [{ npc: "isabella", line: "Tom Jones has a cataoulge of his portraits he carries around on him. Its laminated. I've seen it" }],
  liam: [{ npc: "ryan", line: "can't afford not to" }],
  axeris: [{ npc: "nadia", line: "thanks Ax" }],
  ryan: [{ npc: "nessie", line: "good work" }]
};

async function typeAndSend(npcKey, text, delay) {
  await new Promise(r => setTimeout(r, delay));
  typing.textContent = NPCS[npcKey].name + " is typing ...";
  await new Promise(r => setTimeout(r, 500 + text.length * 20));
  typing.textContent = "";
  render(npcKey, text, false);
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text) return;
  render(null, text, true);
  input.value = "";

  const responders = pickResponders(text);
  let delay = 400;
  let lastNpc = null;
  for (const r of responders) {
    await typeAndSend(r.npc, r.line, delay);
    delay = 200 + Math.floor(Math.random() * 600);
    lastNpc = r.npc;
  }

  // chance of a chain riff after the user's burst lands
  if (lastNpc && CHAIN_REACTIONS[lastNpc] && Math.random() < 0.45) {
    const riff = pick(CHAIN_REACTIONS[lastNpc]);
    await typeAndSend(riff.npc, riff.line, 800);
  }
});
